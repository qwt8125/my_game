<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <linearGradient id="pageBg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfaf6"/>
      <stop offset="1" stop-color="#efe9dc"/>
    </linearGradient>
    <linearGradient id="mapBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#cddfca"/>
      <stop offset="0.48" stop-color="#e8dfbd"/>
      <stop offset="1" stop-color="#c7d8d8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#2a2318" flood-opacity="0.14"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.34"/>
    </pattern>
    <style>
      .title { font: 700 24px "Microsoft YaHei", Arial, sans-serif; fill: #1f2933; }
      .h2 { font: 700 18px "Microsoft YaHei", Arial, sans-serif; fill: #1f2933; }
      .h3 { font: 700 15px "Microsoft YaHei", Arial, sans-serif; fill: #1f2933; }
      .text { font: 13px "Microsoft YaHei", Arial, sans-serif; fill: #667085; }
      .small { font: 12px "Microsoft YaHei", Arial, sans-serif; fill: #667085; }
      .badge { font: 12px "Microsoft YaHei", Arial, sans-serif; fill: #24604f; }
      .white { fill: #ffffff; }
      .panel { fill: #fffdf8; stroke: #d8d1c4; stroke-width: 1; filter: url(#shadow); }
      .card { fill: #ffffff; stroke: #d8d1c4; stroke-width: 1; }
      .active { fill: #eef7f2; stroke: #2f6f5e; stroke-width: 1.4; }
    </style>
  </defs>

  <rect width="1400" height="900" fill="url(#pageBg)"/>

  <text x="28" y="42" class="title">v0.5 可交互地图视觉稿</text>
  <text x="28" y="66" class="text">左侧选地图，中间点击场景点位，右侧查看任务、NPC 对话、探索事件和战斗日志。</text>

