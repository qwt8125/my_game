<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
    <pattern id="paperGrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#d7d7d7" stroke-width="1" opacity="0.55"/>
    </pattern>
    <style>
      .ui-title { font: 700 24px "Microsoft YaHei", Arial, sans-serif; fill: #151515; }
      .h2 { font: 700 18px "Microsoft YaHei", Arial, sans-serif; fill: #151515; }
      .h3 { font: 700 15px "Microsoft YaHei", Arial, sans-serif; fill: #151515; }
      .text { font: 13px "Microsoft YaHei", Arial, sans-serif; fill: #555; }
      .small { font: 12px "Microsoft YaHei", Arial, sans-serif; fill: #666; }
      .panel { fill: #fbfbfb; stroke: #cfcfcf; stroke-width: 1; filter: url(#softShadow); }
      .card { fill: #fff; stroke: #d4d4d4; stroke-width: 1; }
      .selected { fill: #f0f0f0; stroke: #111; stroke-width: 1.4; }
      .pixel { shape-rendering: crispEdges; }
      .label { font: 700 12px "Microsoft YaHei", Arial, sans-serif; fill: #111; }
      .map-label { font: 700 13px "Microsoft YaHei", Arial, sans-serif; fill: #111; paint-order: stroke; stroke: #fff; stroke-width: 4px; stroke-linejoin: round; }
      .badge { font: 12px "Microsoft YaHei", Arial, sans-serif; fill: #111; }
    </style>

