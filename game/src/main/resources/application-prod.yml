server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:${GAME_DB_PATH:./data/game.db}
    hikari:
      maximum-pool-size: 5
      connection-test-query: SELECT 1
      connection-init-sql: PRAGMA foreign_keys=ON
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  redis:
    url: ${REDIS_URL:redis://127.0.0.1:6379/15}
    database: ${REDIS_DATABASE:15}

logging:
  file:
    name: ${LOG_PATH:./logs/legend-game.log}
  level:
    root: INFO
    com.paly.legend: INFO

game:
  auth:
    token-hours: 24
  admin:
    usernames: ${GAME_ADMIN_USERNAMES:admin}
  battle:
    session-store: ${BATTLE_SESSION_STORE:redis}
  ranking:
    cache-ttl-seconds: ${RANKING_CACHE_TTL_SECONDS:60}
